name: Hourly Pipeline

on:
  schedule:
    # Run at minute 0 of every hour (UTC)
    - cron: '0 * * * *'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # We'll push changes later, so need full history and write access
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run live pipeline
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
        run: python3 run_live_pipeline.py

      - name: Commit and push new shards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Hourly pipeline update: new shards [skip ci]"
          git push
